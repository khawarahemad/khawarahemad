
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

:root{
--red:#e53935;--red2:#ff5252;--red3:#ff1744;
--bg:#0a0a0d;--bg2:#111118;--bg3:#1a1a24;--bg4:#1e1e2e;
--border:#2a2a3a;--border2:#3a1a1a;
--text:#e8e8f0;--muted:#8888a8;--accent:#ff5252;
}

body{background:transparent;font-family:'Space Grotesk',sans-serif;color:var(--text);}

.card{
  width:100%;max-width:820px;margin:0 auto;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  position:relative;
}

.scanline{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,82,82,0.015) 2px,rgba(255,82,82,0.015) 4px);
  border-radius:16px;
}

.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border2);
  padding:10px 20px;
  display:flex;align-items:center;gap:10px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
}
.dots{display:flex;gap:6px;}
.dot{width:11px;height:11px;border-radius:50%;}
.d1{background:#ff5f57;}.d2{background:#febc2e;}.d3{background:#28c840;}
.cmd{color:var(--red2);}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.layout{display:grid;grid-template-columns:260px 1fr;min-height:600px;}

.sidebar{
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:32px 24px;
  display:flex;flex-direction:column;gap:24px;
  position:relative;
}

.sidebar::after{
  content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,var(--red) 40%,var(--red) 60%,transparent);
  opacity:0.4;
}

.avatar-wrap{position:relative;display:flex;justify-content:center;}

.avatar-ring{
  width:100px;height:100px;border-radius:50%;
  border:2px solid var(--red);
  padding:3px;
  position:relative;
  box-shadow:0 0 18px rgba(229,57,53,0.25),inset 0 0 8px rgba(229,57,53,0.05);
  animation:ringpulse 3s ease-in-out infinite;
}
@keyframes ringpulse{0%,100%{box-shadow:0 0 18px rgba(229,57,53,0.25);}50%{box-shadow:0 0 30px rgba(255,82,82,0.45);}}

.avatar-inner{
  width:100%;height:100%;border-radius:50%;
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;
  color:var(--red2);letter-spacing:-1px;
  overflow:hidden;
}

.status-dot{
  position:absolute;bottom:6px;right:calc(50% - 42px);
  width:13px;height:13px;border-radius:50%;
  background:#00e676;border:2px solid var(--bg2);
  animation:statusblink 2s ease-in-out infinite;
}
@keyframes statusblink{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.4);}50%{box-shadow:0 0 0 5px rgba(0,230,118,0);}}

.name-block{text-align:center;}
.name{font-size:20px;font-weight:700;color:var(--text);letter-spacing:0.5px;}
.handle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red2);margin-top:4px;}
.tagline{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;font-style:italic;}

.divider{height:1px;background:linear-gradient(to right,transparent,var(--border2),transparent);}

.meta-list{display:flex;flex-direction:column;gap:8px;}
.meta-row{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted);}
.meta-icon{color:var(--red2);font-size:13px;width:14px;flex-shrink:0;}
.meta-val{color:var(--text);}
.meta-link{color:var(--red2);text-decoration:none;}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{
  background:var(--bg4);border:1px solid var(--border2);border-radius:8px;
  padding:10px 6px;text-align:center;
  transition:border-color 0.2s;
}
.stat-box:hover{border-color:var(--red);}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--red2);}
.stat-l{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:1px;}

.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  padding:4px 9px;border-radius:4px;
  border:1px solid var(--border2);
  color:var(--red2);background:rgba(229,57,53,0.07);
}

.main{padding:28px 28px 24px;display:flex;flex-direction:column;gap:22px;}

.section-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--red);letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.section-label::before{content:'//';color:var(--muted);}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

.about-text{font-size:12.5px;color:var(--muted);line-height:1.75;}
.about-text span{color:var(--text);}

.lang-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  padding:5px 11px;border-radius:5px;
  display:flex;align-items:center;gap:5px;
}
.chip-dot{width:6px;height:6px;border-radius:50%;}

.proj-list{display:flex;flex-direction:column;gap:2px;}
.proj{
  padding:10px 12px;border-radius:8px;
  border:1px solid transparent;
  display:grid;grid-template-columns:1fr auto;gap:4px;
  transition:background 0.2s,border-color 0.2s;
  cursor:default;
}
.proj:hover{background:var(--bg3);border-color:var(--border2);}
.proj-top{display:flex;align-items:center;gap:8px;}
.proj-bullet{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.proj-name{font-size:12.5px;font-weight:600;color:var(--text);}
.proj-desc{font-size:11px;color:var(--muted);margin-top:3px;padding-left:15px;line-height:1.5;}
.proj-lang{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  padding:2px 8px;border-radius:4px;align-self:start;margin-top:2px;
  border:1px solid;
}
.proj-stars{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--muted);}

.learning-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.learn-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;
  transition:border-color 0.2s;
}
.learn-card:hover{border-color:var(--red);}
.learn-title{font-size:11.5px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.learn-icon{color:var(--red2);font-size:13px;}
.learn-sub{font-size:10.5px;color:var(--muted);line-height:1.55;}

.footer{
  border-top:1px solid var(--border);
  background:var(--bg2);
  padding:10px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.footer-left{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.footer-right{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red2);}
.footer-links{display:flex;gap:16px;}
.footer-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.footer-link:hover{color:var(--red2);}
</style>

